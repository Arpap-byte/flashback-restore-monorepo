http:
  routers:
    flashback-api:
      rule: "Host(`flashback-restore.com`) && PathPrefix(`/api`) || Host(`www.flashback-restore.com`) && PathPrefix(`/api`) || Host(`api.flashback-restore.com`)"
      entrypoints: websecure
      tls:
        certresolver: myresolver
      service: flashback-api-svc
      middlewares:
        - flashback-cors
        - flashback-security

    flashback-uploads:
      rule: "Host(`flashback-restore.com`) && PathPrefix(`/uploads`) || Host(`www.flashback-restore.com`) && PathPrefix(`/uploads`)"
      entrypoints: websecure
      tls:
        certresolver: myresolver
      service: flashback-api-svc
      middlewares:
        - flashback-security
      priority: 150

    flashback-nextauth:
      rule: "Host(`flashback-restore.com`) && (PathPrefix(`/api/auth/callback`) || Path(`/api/auth/csrf`) || Path(`/api/auth/session`) || Path(`/api/auth/signin`) || Path(`/api/auth/signout`) || Path(`/api/auth/error`) || Path(`/api/auth/providers`) || Path(`/api/auth/_log`)) || Host(`www.flashback-restore.com`) && (PathPrefix(`/api/auth/callback`) || Path(`/api/auth/csrf`) || Path(`/api/auth/session`) || Path(`/api/auth/signin`) || Path(`/api/auth/signout`) || Path(`/api/auth/error`) || Path(`/api/auth/providers`) || Path(`/api/auth/_log`))"
      entrypoints: websecure
      tls:
        certresolver: myresolver
      service: flashback-landing-svc
      middlewares:
        - flashback-security
      priority: 200

    flashback-landing:
      rule: "Host(`flashback-restore.com`) || Host(`www.flashback-restore.com`)"
      entrypoints: websecure
      tls:
        certresolver: myresolver
      service: flashback-landing-svc
      middlewares:
        - flashback-security

    n8n:
      rule: "Host(`n8n.cuisinetouslesjours.fr`)"
      entrypoints: websecure
      tls:
        certresolver: myresolver
      service: n8n-svc

    flashback-http:
      rule: "Host(`flashback-restore.com`) || Host(`www.flashback-restore.com`) || Host(`api.flashback-restore.com`)"
      entrypoints: web
      service: flashback-landing-svc
      middlewares:
        - redirect-https

    n8n-http:
      rule: "Host(`n8n.cuisinetouslesjours.fr`)"
      entrypoints: web
      service: n8n-svc
      middlewares:
        - redirect-https

  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

    flashback-cors:
      headers:
        customResponseHeaders:
          Access-Control-Allow-Origin: "https://flashback-restore.com"
          Access-Control-Allow-Methods: "GET,POST,OPTIONS"
          Access-Control-Allow-Headers: "Content-Type,Authorization"

    flashback-security:
      headers:
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          Referrer-Policy: "strict-origin-when-cross-origin"
          Permissions-Policy: "camera=(), microphone=(), geolocation=()"
        customRequestHeaders:
          X-Forwarded-Proto: "https"

    flashback-basic-auth:
      basicAuth:
        users:
          - "admin:$apr1$HKSxdnl4$in/TA3x.MDAvTtk8FTqTZ."

  services:
    flashback-api-svc:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8000"

    flashback-landing-svc:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8001"

    n8n-svc:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:5679"
