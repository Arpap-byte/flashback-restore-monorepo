name: Flashback Restore - CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # Lint & Type Check
  # =========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pyright pytest pytest-asyncio

      - name: Ruff lint
        run: ruff check app/ --format=github || true

      - name: Pyright type check
        run: pyright app/ --ignoreexternal || true

  # =========================================================================
  # Tests (mock DB, no PostgreSQL required)
  # =========================================================================
  test-mock:
    name: Tests (mock DB)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          ENVIRONMENT=ci
          DEBUG=true
          SECRET_KEY=ci-test-secret-key-change-in-production
          CLERK_ISSUER=https://ci-test.clerk.accounts.dev
          CLERK_JWKS_URL=https://ci-test.clerk.accounts.dev/.well-known/jwks.json
          CLERK_SECRET_KEY=sk_test_ci
          CLERK_WEBHOOK_SECRET=whsec_ci_test
          DATABASE_URL=sqlite+aiosqlite:///./ci_test.db
          REDIS_URL=redis://localhost:6379/1
          SITE_URL=http://localhost:8000
          SENTRY_DSN=
          ADMIN_API_KEY=ci-admin-key
          INTERNAL_API_KEY=ci-internal-key
          SMTP_HOST=localhost
          SMTP_PORT=1025
          SMTP_USER=noreply@test.com
          SMTP_PASSWORD=test
          SMTP_FROM=Flashback CI <noreply@test.com>
          STRIPE_API_KEY=sk_test_ci
          STRIPE_PUBLISHABLE_KEY=pk_test_ci
          STRIPE_WEBHOOK_SECRET=whsec_ci_stripe
          B2_ENDPOINT=s3.us-west-000.backblazeb2.com
          B2_KEY_ID=test-key
          B2_APPLICATION_KEY=test-app-key
          B2_BUCKET_NAME=ci-test
          B2_REGION=us-west-000
          EOF

      - name: Run pytest (mock tests)
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --ignore=tests/test_webhook_clerk.py \
            -k "not db_session and not test_token_clerk_meme_email and not test_verify_clerk_token_appele and not test_user_me_retourne_donnees" \
            -x \
            2>&1 | head -200

  # =========================================================================
  # Webhook tests (require mock only, no PostgreSQL)
  # =========================================================================
  test-webhook:
    name: Tests webhook Clerk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          ENVIRONMENT=ci
          DEBUG=true
          SECRET_KEY=ci-test-secret-key-change-in-production
          CLERK_ISSUER=https://ci-test.clerk.accounts.dev
          CLERK_JWKS_URL=https://ci-test.clerk.accounts.dev/.well-known/jwks.json
          CLERK_SECRET_KEY=sk_test_ci
          CLERK_WEBHOOK_SECRET=whsec_ci_test
          DATABASE_URL=sqlite+aiosqlite:///./ci_test_webhook.db
          SITE_URL=http://localhost:8000
          SENTRY_DSN=
          ADMIN_API_KEY=ci-admin-key
          INTERNAL_API_KEY=ci-internal-key
          SMTP_HOST=localhost
          SMTP_PORT=1025
          SMTP_USER=noreply@test.com
          SMTP_PASSWORD=test
          SMTP_FROM=Flashback CI <noreply@test.com>
          STRIPE_API_KEY=sk_test_ci
          STRIPE_PUBLISHABLE_KEY=pk_test_ci
          STRIPE_WEBHOOK_SECRET=whsec_ci_stripe
          B2_ENDPOINT=s3.us-west-000.backblazeb2.com
          B2_KEY_ID=test-key
          B2_APPLICATION_KEY=test-app-key
          B2_BUCKET_NAME=ci-test
          B2_REGION=us-west-000
          EOF

      - name: Run webhook tests
        run: python -m pytest tests/test_webhook_clerk.py -v --tb=short

  # =========================================================================
  # Security audit (bandit)
  # =========================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r app/ -ll -f json -o bandit-report.json || true

      - name: Check for high-severity issues
        run: |
          if [ -f bandit-report.json ]; then
            HIGH=$(python -c "
          import json
          with open('bandit-report.json') as f:
              results = json.load(f)
          high = [r for r in results.get('results',[]) if r.get('issue_severity') in ('HIGH','MEDIUM')]
          print(len(high))
          ")
            if [ "$HIGH" -gt 0 ]; then
              echo "::warning::$HIGH medium/high severity issues found"
            fi
          fi

  # =========================================================================
  # Deploy to production (on push to main)
  # =========================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-mock, test-webhook, lint, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://flashback-restore.com
    steps:
      - name: Trigger deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_SSH_PORT }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/flashback-restore-monorepo
            git pull origin main
            cd backend
            .venv/bin/pip install -r requirements.txt --quiet
            sudo systemctl restart flashback-backend flashback-arq-worker
            cd ../landing
            npm ci --production --silent
            npm run build
            sudo systemctl restart flashback-landing
            cd ..
            bash infra/post_deploy_check.sh
            echo "✅ Deploy completed at $(date -Iseconds)"
