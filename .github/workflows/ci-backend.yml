# ============================================
# Flashback Restore — CI Backend (FastAPI)
# ============================================

name: CI Backend

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Installer Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Installer dépendances
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
          pip install -r requirements.txt

      - name: 🧹 Ruff (Lint)
        run: ruff check .

      - name: ✨ Black (Format)
        run: black --check --diff .

      - name: 🔬 MyPy (Type Check)
        run: mypy . --ignore-missing-imports || true

  test:
    name: 🧪 Tests Python
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flashback
          POSTGRES_PASSWORD: flashback
          POSTGRES_DB: flashback_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Installer Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Installer dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: 🧪 Lancer tests
        env:
          DATABASE_URL: postgresql://flashback:flashback@localhost:5432/flashback_test
          REDIS_URL: redis://localhost:6379/0
          GEMINI_API_KEY: test-key
          DID_API_KEY: test-key
          ENVIRONMENT: test
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term -v

      - name: 📊 Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage.xml
