name: flashback_restore
description: Restaurez et animez vos photos anciennes grâce à l'IA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Network & API
  dio: ^5.4.0
  google_generative_ai: ^0.2.0  # Gemini SDK officiel

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  firebase_storage: ^11.6.0
  cloud_firestore: ^4.14.0
  firebase_analytics: ^10.7.4

  # Image Processing
  image_picker: ^1.0.7
  image_cropper: ^5.0.1
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0

  # Video/Animation
  video_player: ^2.8.2
  lottie: ^3.0.0

  # In-App Purchases
  purchases_flutter: ^6.17.0  # RevenueCat SDK

  # Storage & Cache
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  hive_flutter: ^1.1.0

  # UI Components
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0

  # Utils
  uuid: ^4.2.2
  intl: ^0.18.1
  permission_handler: ^11.2.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  freezed: ^2.4.6
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
