services:
  traefik:
    image: traefik:v3.6.2
    container_name: traefik
    network_mode: host
    command:
      - "--api.insecure=false"
      - "--providers.docker=false"
      - "--providers.file.filename=/etc/traefik/flashback-dynamic.yml"
      - "--accesslog=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    volumes:
      - "./traefik:/letsencrypt"
      - "./traefik/flashback-dynamic.yml:/etc/traefik/flashback-dynamic.yml:ro"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:2.2.5
    container_name: n8n
    environment:
      - N8N_HOST=${DOMAIN}
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - N8N_EDITOR_BASE_URL=https://${DOMAIN}/
      - WEBHOOK_URL=https://${DOMAIN}/
      - N8N_TRUSTED_PROXIES=loopback,linklocal,uniquelocal
      - N8N_REQUEST_TIMEOUT=300000
      - N8N_ENCRYPTION_KEY=changeme_key
      - N8N_LICENSE_ACTIVATION_KEY=ad49dcf8-6e01-4914-9b7e-fceea3f501a9
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5679:5678"
    volumes:
      - "./n8n:/home/node/.n8n"
    restart: unless-stopped
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=n8n
    volumes:
      - "./data:/var/lib/postgresql/data"
    restart: unless-stopped
